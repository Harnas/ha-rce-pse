views:
  - title: Ceny Energii
    type: sections
    max_columns: 3
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Dzisiaj
            heading_style: title
          - type: tile
            entity: sensor.rce_pse_cena
            name: Teraz
            vertical: false
            features_position: bottom
          - type: tile
            entity: sensor.rce_pse_srednia_cena_dzisiaj
            name: Średnia
            vertical: false
            features_position: bottom
          - type: tile
            entity: sensor.rce_pse_mediana_cen_dzisiaj
            name: Mediana
            vertical: false
            features_position: bottom
          - type: tile
            entity: sensor.rce_pse_minimalna_cena_dzisiaj
            name: Min
            vertical: false
            features_position: bottom
          - type: tile
            entity: sensor.rce_pse_maksymalna_cena_dzisiaj
            name: Max
            vertical: false
            features_position: bottom
          - type: custom:apexcharts-card
            header:
              show: false
              title: RCE Dzisiaj
              show_states: false
              colorize_states: true
            graph_span: 24h
            update_interval: 1min
            cache: false
            experimental:
              color_threshold: true
            span:
              start: day
            yaxis:
              - id: price
                min: ~0
                decimals: 0
                apex_config:
                  title:
                    text: Cena [PLN/MWh]
            apex_config:
              chart:
                height: 300
              dataLabels:
                enabled: false
              stroke:
                curve: smooth
                width: 5
              tooltip:
                enabled: true
                x:
                  format: dd MMM HH:mm
              annotations:
                yaxis:
                  - "y": 200
                    borderColor: "#00E396"
                    label:
                      text: Niska cena
                      style:
                        color: "#fff"
                        background: "#00E396"
                  - "y": 500
                    borderColor: "#FEB019"
                    label:
                      text: Wysoka cena
                      style:
                        color: "#fff"
                        background: "#FEB019"
            series:
              - entity: sensor.rce_pse_cena
                attribute: prices
                name: Cena bieżąca
                yaxis_id: price
                type: line
                curve: smooth
                time_delta: "-15min"
                stroke_width: 5
                extend_to: end
                color_threshold:
                  - value: 0
                    color: "#2196F3"
                  - value: 300
                    color: "#4CAF50"
                  - value: 500
                    color: "#FF9800"
                  - value: 700
                    color: "#F44336"
                data_generator: |
                  return entity.attributes.prices.map((entry) => {
                    return [new Date(entry.dtime).getTime(), parseFloat(entry.rce_pln)];
                  });
                show:
                  extremas: true
                  in_header: before_now
                  legend_value: false
            now:
              show: true
              label: Teraz
              color: red
        column_span: 1
      - type: grid
        cards:
          - type: heading
            heading: Jutro
            heading_style: title
          - type: tile
            entity: sensor.rce_pse_mediana_cen_jutro
            name: Mediana
            vertical: false
            features_position: bottom
          - type: tile
            entity: sensor.rce_pse_srednia_cena_jutro
            name: Średnia
            vertical: false
            features_position: bottom
          - type: tile
            entity: sensor.rce_pse_jutro_vs_dzisiaj_srednia
            name: Jutro vs średnia dziś
            vertical: false
            features_position: bottom
          - type: tile
            entity: sensor.rce_pse_minimalna_cena_jutro
            name: Min
            vertical: false
            features_position: bottom
          - type: tile
            entity: sensor.rce_pse_maksymalna_cena_jutro
            name: Max
            vertical: false
            features_position: bottom
          - type: custom:apexcharts-card
            header:
              show: false
              title: RCE Jutro
              show_states: false
              colorize_states: true
            graph_span: 24h
            update_interval: 1min
            cache: false
            experimental:
              color_threshold: true
            span:
              start: day
              offset: +24h
            yaxis:
              - id: price
                min: ~0
                decimals: 0
                apex_config:
                  title:
                    text: Cena [PLN/MWh]
            apex_config:
              chart:
                height: 300
              dataLabels:
                enabled: false
              stroke:
                curve: smooth
                width: 5
              tooltip:
                enabled: true
                x:
                  format: dd MMM HH:mm
              annotations:
                yaxis:
                  - "y": 200
                    borderColor: "#00E396"
                    label:
                      text: Niska cena
                      style:
                        color: "#fff"
                        background: "#00E396"
                  - "y": 500
                    borderColor: "#FEB019"
                    label:
                      text: Wysoka cena
                      style:
                        color: "#fff"
                        background: "#FEB019"
            series:
              - entity: sensor.rce_pse_cena_jutro
                attribute: prices
                name: Cena jutro
                yaxis_id: price
                type: line
                curve: smooth
                time_delta: "-15min"
                stroke_width: 5
                opacity: 1
                extend_to: end
                color_threshold:
                  - value: 0
                    color: "#64B5F6"
                  - value: 300
                    color: "#81C784"
                  - value: 500
                    color: "#FFB74D"
                  - value: 700
                    color: "#E57373"
                data_generator: |
                  return entity.attributes.prices.map((entry) => {
                    return [new Date(entry.dtime).getTime(), parseFloat(entry.rce_pln)];
                  });
                show:
                  extremas: true
                  in_header: false
                  legend_value: false
        column_span: 1
      - type: grid
        column_span: 3
        cards:
          - type: markdown
            content: |
              Ceny jutrzejsze i **Kompas na jutro** mają osobne harmonogramy publikacji w API PSE.
          - type: tile
            entity: sensor.rce_pse_aktualna_vs_srednia_dzisiaj
            name: Aktualna vs średnia
            vertical: false
            features_position: bottom
          - type: tile
            entity: sensor.rce_pse_cena_nastepny_okres
            name: Następny okres
            vertical: false
            features_position: bottom
          - type: tile
            entity: sensor.rce_pse_cena_poprzedni_okres
            name: Poprzedni okres
            vertical: false
            features_position: bottom
          - type: tile
            entity: sensor.rce_pse_cena_sprzedazy_prosument
            name: Cena sprzedaży prosument
            vertical: false
            features_position: bottom
      - type: grid
        column_span: 3
        cards:
          - type: heading
            heading: Najniższa i najwyższa cena doby (PSE)
            heading_style: title
          - type: entities
            title: Dzisiaj
            show_header_toggle: false
            entities:
              - entity: sensor.rce_pse_najnizsza_cena_dzisiaj_poczatek
                name: Najniższa — początek
              - entity: sensor.rce_pse_najnizsza_cena_dzisiaj_koniec
                name: Najniższa — koniec
              - entity: sensor.rce_pse_najwyzsza_cena_dzisiaj_poczatek
                name: Najwyższa — początek
              - entity: sensor.rce_pse_najwyzsza_cena_dzisiaj_koniec
                name: Najwyższa — koniec
          - type: entities
            title: Jutro
            show_header_toggle: false
            entities:
              - entity: sensor.rce_pse_najnizsza_cena_jutro_poczatek
                name: Najniższa — początek
              - entity: sensor.rce_pse_najnizsza_cena_jutro_koniec
                name: Najniższa — koniec
              - entity: sensor.rce_pse_najwyzsza_cena_jutro_poczatek
                name: Najwyższa — początek
              - entity: sensor.rce_pse_najwyzsza_cena_jutro_koniec
                name: Najwyższa — koniec
      - type: grid
        column_span: 3
        cards:
          - type: heading
            heading: Konfigurowalne okna cenowe
            heading_style: title
          - type: entities
            title: Dzisiaj
            show_header_toggle: false
            entities:
              - entity: sensor.rce_pse_tanie_okno_dzisiaj_poczatek
                name: Tanie okno — początek
              - entity: sensor.rce_pse_tanie_okno_dzisiaj_koniec
                name: Tanie okno — koniec
              - entity: sensor.rce_pse_tanie_okno_srednia_cena_dzisiaj
                name: Tanie okno — średnia
              - entity: sensor.rce_pse_drogie_okno_dzisiaj_poczatek
                name: Drogie okno — początek
              - entity: sensor.rce_pse_drogie_okno_dzisiaj_koniec
                name: Drogie okno — koniec
              - entity: sensor.rce_pse_drogie_okno_srednia_cena_dzisiaj
                name: Drogie okno — średnia
              - entity: sensor.rce_pse_drugie_drogie_okno_dzisiaj_poczatek
                name: Drugie drogie okno — początek
              - entity: sensor.rce_pse_drugie_drogie_okno_dzisiaj_koniec
                name: Drugie drogie okno — koniec
              - entity: sensor.rce_pse_drugie_drogie_okno_srednia_cena_dzisiaj
                name: Drugie drogie okno — średnia
          - type: entities
            title: Jutro
            show_header_toggle: false
            entities:
              - entity: sensor.rce_pse_tanie_okno_jutro_poczatek
                name: Tanie okno — początek
              - entity: sensor.rce_pse_tanie_okno_jutro_koniec
                name: Tanie okno — koniec
              - entity: sensor.rce_pse_tanie_okno_srednia_cena_jutro
                name: Tanie okno — średnia
              - entity: sensor.rce_pse_drogie_okno_jutro_poczatek
                name: Drogie okno — początek
              - entity: sensor.rce_pse_drogie_okno_jutro_koniec
                name: Drogie okno — koniec
              - entity: sensor.rce_pse_drogie_okno_srednia_cena_jutro
                name: Drogie okno — średnia
              - entity: sensor.rce_pse_drugie_drogie_okno_jutro_poczatek
                name: Drugie drogie okno — początek
              - entity: sensor.rce_pse_drugie_drogie_okno_jutro_koniec
                name: Drugie drogie okno — koniec
              - entity: sensor.rce_pse_drugie_drogie_okno_srednia_cena_jutro
                name: Drugie drogie okno — średnia
      - type: grid
        column_span: 3
        cards:
          - type: heading
            heading: Progi niskiej i wysokiej ceny
            heading_style: title
          - type: entities
            show_header_toggle: false
            entities:
              - entity: sensor.rce_pse_cena_ponizej_progu_poczatek
                name: Poniżej progu — początek
              - entity: sensor.rce_pse_cena_ponizej_progu_koniec
                name: Poniżej progu — koniec
              - entity: sensor.rce_pse_cena_powyzej_progu_poczatek
                name: Powyżej progu — początek
              - entity: sensor.rce_pse_cena_powyzej_progu_koniec
                name: Powyżej progu — koniec
      - type: grid
        column_span: 3
        cards:
          - type: heading
            heading: Aktywne okna (automatyzacje)
            heading_style: title
          - type: entities
            show_header_toggle: false
            state_color: true
            entities:
              - entity: binary_sensor.rce_pse_najnizsza_cena_aktywna
                name: Trwa najtańsza godzina doby (PSE)
              - entity: binary_sensor.rce_pse_najwyzsza_cena_aktywna
                name: Trwa najdroższa godzina doby (PSE)
              - entity: binary_sensor.rce_pse_tanie_okno_aktywne
                name: Tanie okno aktywne
              - entity: binary_sensor.rce_pse_drogie_okno_aktywne
                name: Drogie okno aktywne
              - entity: binary_sensor.rce_pse_drugie_drogie_okno_aktywne
                name: Drugie drogie okno aktywne
              - entity: binary_sensor.rce_pse_cena_ponizej_progu_aktywna
                name: Cena poniżej progu
              - entity: binary_sensor.rce_pse_cena_powyzej_progu_aktywna
                name: Cena powyżej progu

  - title: Kompas Energetyczny
    type: sections
    max_columns: 2
    sections:
      - type: grid
        column_span: 2
        cards:
          - type: heading
            heading: Kompas — dziś (godzina po godzinie)
            heading_style: title
          - type: markdown
            content: |
              **Teraz:** {{ states('sensor.rce_pse_kompas_energetyczny_dzisiaj') }}

              Ostatnia synchronizacja danych: `{{ state_attr('sensor.rce_pse_cena', 'last_update') }}`
          - type: markdown
            content: |
              <div style="font-size:0.85em;line-height:1.5">
              <strong>Możliwe alerty użytkowania prądu</strong><br/>
              <span style="display:inline-block;width:14px;height:14px;background:#2d5a00;vertical-align:middle;margin-right:6px;border-radius:3px"></span> Zalecane użytkowanie (nadmiar energii)<br/>
              <span style="display:inline-block;width:14px;height:14px;background:#99cc00;vertical-align:middle;margin-right:6px;border-radius:3px"></span> Normalne użytkowanie<br/>
              <span style="display:inline-block;width:14px;height:14px;background:#ffcc00;vertical-align:middle;margin-right:6px;border-radius:3px"></span> Zalecane oszczędzanie<br/>
              <span style="display:inline-block;width:14px;height:14px;background:#cc3300;vertical-align:middle;margin-right:6px;border-radius:3px"></span> Wymagane ograniczanie
              </div>
          - type: horizontal-stack
            cards:
              - type: custom:button-card
                entity: sensor.rce_pse_kompas_energetyczny_dzisiaj
                show_icon: false
                show_state: false
                name: "00:00"
                tap_action:
                  action: more-info
                styles:
                  card:
                    - padding: 8px 4px
                    - border-radius: 10px
                    - background-color: |
                        [[[ const hour=0; const vals=(entity.attributes.values)||[]; let st=null; for(const v of vals){ if(!v.dtime)continue; const p=v.dtime.split(' '); if(p.length<2)continue; const hh=parseInt(p[1].split(':')[0],10); if(hh===hour){ st=v.state; break; } } const c={'recommended_usage':'#2d5a00','normal_usage':'#99cc00','recommended_saving':'#ffcc00','required_restriction':'#cc3300'}; return st? (c[st]||'#bdbdbd') : '#e8e8e8'; ]]]
                    - border: |
                        [[[ const hour=0; return (new Date().getHours()===hour) ? '3px solid #1a2b56' : '1px solid rgba(0,0,0,0.08)'; ]]]
                  name:
                    - font-size: 11px
                    - font-weight: 600
                    - color: |
                        [[[ const hour=0; const vals=(entity.attributes.values)||[]; let st=null; for(const v of vals){ if(!v.dtime)continue; const p=v.dtime.split(' '); if(p.length<2)continue; const hh=parseInt(p[1].split(':')[0],10); if(hh===hour){ st=v.state; break; } } const light=st==='recommended_usage'||st==='required_restriction'; return light ? '#f5f5f5' : '#1a1a1a'; ]]]

              - type: custom:button-card
                entity: sensor.rce_pse_kompas_energetyczny_dzisiaj
                show_icon: false
                show_state: false
                name: "01:00"
                tap_action:
                  action: more-info
                styles:
                  card:
                    - padding: 8px 4px
                    - border-radius: 10px
                    - background-color: |
                        [[[ const hour=1; const vals=(entity.attributes.values)||[]; let st=null; for(const v of vals){ if(!v.dtime)continue; const p=v.dtime.split(' '); if(p.length<2)continue; const hh=parseInt(p[1].split(':')[0],10); if(hh===hour){ st=v.state; break; } } const c={'recommended_usage':'#2d5a00','normal_usage':'#99cc00','recommended_saving':'#ffcc00','required_restriction':'#cc3300'}; return st? (c[st]||'#bdbdbd') : '#e8e8e8'; ]]]
                    - border: |
                        [[[ const hour=1; return (new Date().getHours()===hour) ? '3px solid #1a2b56' : '1px solid rgba(0,0,0,0.08)'; ]]]
                  name:
                    - font-size: 11px
                    - font-weight: 600
                    - color: |
                        [[[ const hour=1; const vals=(entity.attributes.values)||[]; let st=null; for(const v of vals){ if(!v.dtime)continue; const p=v.dtime.split(' '); if(p.length<2)continue; const hh=parseInt(p[1].split(':')[0],10); if(hh===hour){ st=v.state; break; } } const light=st==='recommended_usage'||st==='required_restriction'; return light ? '#f5f5f5' : '#1a1a1a'; ]]]

